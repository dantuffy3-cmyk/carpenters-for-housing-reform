<style>
  :root{
    --bg:#07110b;
    --panel:#0b1a10;
    --card:#0f2416;
    --text:#eafff2;
    --muted:#b7e9c8;
    --line:#1f5a33;
    --green:#39ff88;      /* bright green */
    --green2:#00d26a;     /* deeper green */
    --accent:#7cffb0;
    --shadow: 0 10px 30px rgba(0,0,0,.35);
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:
      radial-gradient(1200px 600px at 20% -10%, rgba(57,255,136,.18), transparent 60%),
      radial-gradient(900px 500px at 90% 10%, rgba(0,210,106,.14), transparent 55%),
      linear-gradient(180deg, var(--bg), #050b07);
    color:var(--text);
  }

  .wrap{max-width:1020px;margin:0 auto;padding:26px 18px 70px;}

  header{
    border:1px solid rgba(57,255,136,.25);
    background: linear-gradient(135deg, rgba(57,255,136,.16), rgba(0,210,106,.08));
    border-radius:22px;
    padding:22px 18px;
    box-shadow: var(--shadow);
  }

  .toprow{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between;}
  .tag{
    display:inline-flex;align-items:center;gap:10px;
    border:1px solid rgba(57,255,136,.35);
    padding:8px 12px;border-radius:999px;
    color:var(--muted);font-size:13px;
    background: rgba(7,17,11,.55);
  }
  .dot{width:10px;height:10px;border-radius:999px;background:var(--green);box-shadow:0 0 20px rgba(57,255,136,.6);}

  h1{font-size:42px;line-height:1.08;margin:14px 0 10px;}
  .lead{font-size:17px;color:var(--muted);max-width:860px;line-height:1.55;margin:0;}

  .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
  a.btn{
    display:inline-flex;align-items:center;gap:10px;
    text-decoration:none;border-radius:14px;
    padding:12px 14px;border:1px solid rgba(57,255,136,.28);
    color:var(--text);background: rgba(7,17,11,.40);
  }
  a.btn.primary{
    border-color: transparent;
    background: linear-gradient(90deg, var(--green), var(--green2));
    color:#031108;font-weight:800;
    box-shadow:0 10px 22px rgba(57,255,136,.18);
  }
  a.btn:hover{transform: translateY(-1px);}

  .grid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:16px;}
  @media(min-width:880px){.grid{grid-template-columns:1fr 1fr;}}

  section{
    background: linear-gradient(180deg, rgba(15,36,22,.92), rgba(11,26,16,.92));
    border:1px solid rgba(57,255,136,.18);
    border-radius:18px;
    padding:18px;
    box-shadow: 0 10px 24px rgba(0,0,0,.25);
  }
  .full{grid-column:1/-1;}
  h2{margin:0 0 10px;font-size:19px;}
  p,li{color:var(--muted);line-height:1.62;}
  ul{margin:10px 0 0 18px;}

  .divider{height:1px;background:rgba(57,255,136,.18);margin:12px 0;}
  .callout{
    border:1px solid rgba(57,255,136,.28);
    background: rgba(7,17,11,.40);
    border-radius:16px;padding:14px;
  }
  .kicker{margin:0 0 6px;font-weight:800;color:var(--text);}
  .small{font-size:13px;color:rgba(183,233,200,.9);}
  footer{margin-top:18px;color:rgba(183,233,200,.75);font-size:13px;}

  /* Form */
  iframe{border-radius:16px;overflow:hidden;border:1px solid rgba(57,255,136,.22);background:rgba(7,17,11,.35);}
</style>
